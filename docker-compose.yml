version: '3.8'

services:
  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: reposage-ai-engine
    ports:
      - "8000:8000"
    volumes:
      - ./ai-engine:/usr/src/app
      - /usr/src/app/__pycache__
    environment:
      - PORT=8000
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reposage-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      - AI_ENGINE_URL=http://ai-engine:8000
    depends_on:
      - ai-engine
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reposage-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: always
